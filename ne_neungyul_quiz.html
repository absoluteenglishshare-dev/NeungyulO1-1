<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABSOLUTE 영어 | 공통영어1 NE능률(오선영)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
// ResponsiveVoice: load without key requirement, fallback to SpeechSynthesis
(function(){
  var s=document.createElement('script');
  s.src='https://code.responsivevoice.org/responsivevoice.js?key=FREE';
  s.onerror=function(){window._rvFailed=true;};
  document.head.appendChild(s);
})();
function speakEnglish(text){
  if(typeof responsiveVoice!=='undefined'&&responsiveVoice.voiceSupport()){
    responsiveVoice.speak(text,'UK English Female',{rate:.9});
  } else if(window.speechSynthesis){
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB'; u.rate=0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}
</script>
<style>
:root {
  --bg:#0c0c0f; --surface:#13131a; --card:#1a1a24; --border:#2a2a3d;
  --accent:#6366f1; --accent2:#8b5cf6; --gold:#f59e0b;
  --green:#10b981; --red:#ef4444; --text:#f0f0f8; --muted:#6b7280;
  --tag:#1e1e35; --syn:#22d3ee; --ant:#fb7185;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

.header{background:linear-gradient(135deg,#0a0a14,#16082a);border-bottom:1px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;background:linear-gradient(90deg,#818cf8,#c084fc,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px;}
.school-tag{background:var(--tag);border:1px solid #3a3a5a;border-radius:8px;padding:4px 10px;font-size:10px;color:#a5b4fc;font-family:'Space Mono',monospace;}

.screen{display:none;padding:20px 16px;max-width:600px;margin:0 auto;}
.screen.active{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.home-hero{text-align:center;padding:24px 0 16px;}
.home-title{font-size:22px;font-weight:900;line-height:1.3;margin-bottom:6px;}
.home-title em{color:#818cf8;font-style:normal;}
.home-desc{color:var(--muted);font-size:11px;line-height:1.7;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-num{font-family:'Space Mono',monospace;font-size:20px;color:#818cf8;font-weight:700;}
.stat-label{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.5px;}

.section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);margin:18px 0 8px;text-transform:uppercase;}

.lesson-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.lesson-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all .2s;text-align:left;}
.lesson-btn:active{transform:scale(.97);}
.lesson-btn.selected{border-color:var(--accent);background:rgba(99,102,241,.12);}
.lesson-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:1px;}
.lesson-name{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4;}
.lesson-count{font-size:10px;color:#818cf8;margin-top:4px;font-family:'Space Mono',monospace;}

.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.type-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 8px;cursor:pointer;transition:all .2s;text-align:center;}
.type-btn.selected{border-color:var(--gold);background:rgba(245,158,11,.1);}
.type-icon{font-size:20px;margin-bottom:4px;}
.type-label{font-size:11px;font-weight:700;color:var(--text);}
.type-desc{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.4;}

.count-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.count-btn{flex:1;min-width:60px;background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 4px;cursor:pointer;font-family:'Space Mono',monospace;font-size:13px;color:var(--text);text-align:center;transition:all .2s;}
.count-btn.selected{border-color:var(--syn);background:rgba(34,211,238,.1);color:var(--syn);}

.start-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;padding:16px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.start-btn:active{transform:scale(.98);opacity:.9;}
.start-btn:disabled{opacity:.4;cursor:not-allowed;}

.quiz-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.q-progress-wrap{flex:1;background:var(--border);border-radius:99px;height:6px;overflow:hidden;}
.q-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease;}
.q-counter{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.q-score{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);white-space:nowrap;}

.q-type-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.badge-A{background:rgba(99,102,241,.2);color:#818cf8;border:1px solid rgba(99,102,241,.4);}
.badge-B{background:rgba(139,92,246,.2);color:#c084fc;border:1px solid rgba(139,92,246,.4);}
.badge-C{background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.4);}

.q-lesson-info{font-size:10px;color:var(--muted);margin-bottom:6px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 16px 18px;margin-bottom:14px;position:relative;}
.q-word{font-family:'Space Mono',monospace;font-size:26px;color:var(--text);font-weight:700;line-height:1.2;word-break:break-all;}
.q-word small{font-size:13px;color:var(--syn);}
.q-hint{font-size:11px;color:var(--muted);margin-top:6px;}
.tts-btn{position:absolute;top:14px;right:14px;background:rgba(129,140,248,.15);border:1px solid rgba(129,140,248,.3);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;transition:all .2s;}
.tts-btn:active{transform:scale(.9);}

.choices{display:grid;gap:10px;}
.choice-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;text-align:left;cursor:pointer;transition:all .18s;line-height:1.5;}
.choice-btn:active{transform:scale(.98);}
.choice-btn.correct{border-color:var(--green);background:rgba(16,185,129,.12);color:#34d399;}
.choice-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:#f87171;}
.choice-btn.disabled{cursor:default;opacity:.6;}
.choice-btn.reveal{border-color:var(--green);background:rgba(16,185,129,.08);}

.feedback-box{border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1px solid;animation:fadeUp .25s ease;}
.feedback-box.correct{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);}
.feedback-box.wrong{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.25);}
.fb-status{font-size:13px;font-weight:700;margin-bottom:8px;}
.fb-status.ok{color:var(--green);}
.fb-status.no{color:var(--red);}
.fb-row{display:flex;gap:6px;margin-bottom:4px;align-items:flex-start;flex-wrap:wrap;}
.fb-label{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.fb-label.kr{background:rgba(129,140,248,.2);color:#a5b4fc;}
.fb-label.en{background:rgba(139,92,246,.2);color:#c084fc;}
.fb-label.syn{background:rgba(34,211,238,.15);color:var(--syn);}
.fb-label.ant{background:rgba(251,113,133,.15);color:var(--ant);}
.fb-val{font-size:12px;color:var(--text);line-height:1.6;}

.next-btn{width:100%;background:linear-gradient(135deg,#1e1e35,#2a1f45);border:1px solid var(--accent);border-radius:12px;padding:14px;color:#a5b4fc;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.next-btn:active{transform:scale(.98);}

.result-hero{text-align:center;padding:30px 0 20px;}
.result-score{font-family:'Bebas Neue',sans-serif;font-size:72px;color:var(--gold);line-height:1;}
.result-total{font-size:13px;color:var(--muted);margin-top:4px;}
.result-comment{font-size:16px;font-weight:700;margin-top:14px;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0 20px;}
.result-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.result-stat .num{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
.result-stat .lbl{font-size:10px;color:var(--muted);margin-top:3px;}
.result-stat.c .num{color:var(--green);}
.result-stat.w .num{color:var(--red);}
.result-stat.p .num{color:var(--gold);}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.action-btn{border-radius:12px;padding:14px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;text-align:center;transition:all .2s;border:none;}
.action-btn.retry{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.action-btn.home{background:var(--card);border:1px solid var(--border);color:var(--text);}
.action-btn:active{transform:scale(.97);}

.wrong-list{margin-top:16px;}
.wrong-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.wi-word{font-family:'Space Mono',monospace;font-size:14px;color:#c084fc;font-weight:700;}
.wi-mean{font-size:12px;color:var(--muted);margin-top:2px;}

.back-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:5px;margin-bottom:6px;font-family:'Noto Sans KR',sans-serif;}
.back-btn:hover{color:var(--text);}
.back-btn svg{width:14px;height:14px;}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="brand">ABSOLUTE 영어</div>
    <div class="brand-sub">단어 퀴즈 시스템</div>
  </div>
  <div class="school-tag">공통영어1 · NE능률</div>
</header>

<div id="screen-home" class="screen active">
  <div class="home-hero">
    <div class="home-title">NE능률 <em>(오선영)</em><br>공통영어1 단어퀴즈</div>
    <div class="home-desc">2022 개정 | Lesson 1~4 | 유의어·반의어 포함</div>
  </div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num" id="total-count">0</div><div class="stat-label">총 단어</div></div>
    <div class="stat-card"><div class="stat-num">4</div><div class="stat-label">Lesson</div></div>
    <div class="stat-card"><div class="stat-num">A/B/C</div><div class="stat-label">퀴즈 타입</div></div>
  </div>
  <div class="section-title">📚 Lesson 선택 (복수 가능)</div>
  <div class="lesson-grid" id="lesson-grid"></div>
  <div class="section-title">🎯 퀴즈 타입</div>
  <div class="type-grid">
    <div class="type-btn selected" data-type="A" onclick="toggleType(this,'A')">
      <div class="type-icon">🔤</div><div class="type-label">TYPE A</div>
      <div class="type-desc">뜻 → 단어<br>한글 보고 영단어</div>
    </div>
    <div class="type-btn selected" data-type="B" onclick="toggleType(this,'B')">
      <div class="type-icon">📖</div><div class="type-label">TYPE B</div>
      <div class="type-desc">단어 → 뜻<br>영단어 보고 뜻</div>
    </div>
    <div class="type-btn selected" data-type="C" onclick="toggleType(this,'C')">
      <div class="type-icon">🔗</div><div class="type-label">TYPE C</div>
      <div class="type-desc">단어 → 유의어/반의어<br>영단어 대 영단어</div>
    </div>
  </div>
  <div class="section-title">🔢 문제 수</div>
  <div class="count-row">
    <div class="count-btn selected" data-n="10" onclick="selectCount(this)">10</div>
    <div class="count-btn" data-n="20" onclick="selectCount(this)">20</div>
    <div class="count-btn" data-n="30" onclick="selectCount(this)">30</div>
    <div class="count-btn" data-n="50" onclick="selectCount(this)">50</div>
    <div class="count-btn" data-n="0" onclick="selectCount(this)">전체</div>
  </div>
  <button class="start-btn" id="start-btn" onclick="startQuiz()">퀴즈 시작</button>
</div>

<div id="screen-quiz" class="screen">
  <button class="back-btn" onclick="goHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    처음으로
  </button>
  <div class="quiz-header">
    <div class="q-progress-wrap"><div class="q-progress-bar" id="q-progress"></div></div>
    <div class="q-counter" id="q-counter">1/10</div>
    <div class="q-score" id="q-score-disp">0점</div>
  </div>
  <div class="q-lesson-info" id="q-lesson-info"></div>
  <div id="q-type-badge"></div>
  <div class="q-card">
    <button class="tts-btn" id="tts-btn" onclick="speakWord()">🔊</button>
    <div class="q-word" id="q-word"></div>
    <div class="q-hint" id="q-hint"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div id="feedback-area"></div>
  <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()">다음 →</button>
</div>

<div id="screen-result" class="screen">
  <div class="result-hero">
    <div class="result-score" id="r-score">0</div>
    <div class="result-total" id="r-total">/ 0점</div>
    <div class="result-comment" id="r-comment"></div>
  </div>
  <div class="result-grid">
    <div class="result-stat c"><div class="num" id="r-correct">0</div><div class="lbl">정답</div></div>
    <div class="result-stat w"><div class="num" id="r-wrong">0</div><div class="lbl">오답</div></div>
    <div class="result-stat p"><div class="num" id="r-pct">0%</div><div class="lbl">정답률</div></div>
  </div>
  <div class="action-row">
    <button class="action-btn retry" onclick="retryQuiz()">다시 풀기</button>
    <button class="action-btn home" onclick="goHome()">처음으로</button>
  </div>
  <div class="wrong-list" id="wrong-list"></div>
</div>

let selectedLessons=[1,2,3,4],selectedTypes=['A','B','C'],quizCount=10;

function init(){
  document.getElementById('total-count').textContent=WORDS.length;
  const lessonMeta=[
    {n:1,name:"Identity & Growth"},
    {n:2,name:"Connection & Healing"},
    {n:3,name:"Nature & Environment"},
    {n:4,name:"Media & History"}
  ];
  const grid=document.getElementById('lesson-grid');
  lessonMeta.forEach(lm=>{
    const cnt=WORDS.filter(w=>w.l===lm.n).length;
    const btn=document.createElement('div');
    btn.className='lesson-btn selected';
    btn.dataset.lesson=lm.n;
    btn.onclick=()=>toggleLesson(btn,lm.n);
    btn.innerHTML=`<div class="lesson-num">LESSON ${lm.n}</div><div class="lesson-name">${lm.name}</div><div class="lesson-count">${cnt} words</div>`;
    grid.appendChild(btn);
  });
}

function toggleLesson(el,n){
  if(selectedLessons.includes(n)){
    if(selectedLessons.length===1)return;
    selectedLessons=selectedLessons.filter(x=>x!==n);
    el.classList.remove('selected');
  } else {
    selectedLessons.push(n);
    el.classList.add('selected');
  }
}
function toggleType(el,t){
  if(selectedTypes.includes(t)){
    if(selectedTypes.length===1)return;
    selectedTypes=selectedTypes.filter(x=>x!==t);
    el.classList.remove('selected');
  } else {
    selectedTypes.push(t);
    el.classList.add('selected');
  }
}
function selectCount(el){
  document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  quizCount=parseInt(el.dataset.n);
}

// QUIZ BUILD
// ══════════════════════════════════════════════════════════
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildQueue(){
  const pool=WORDS.filter(w=>selectedLessons.includes(w.l));
  if(!pool.length)return[];
  const shuffled=shuffle(pool);
  const limit=quizCount===0?shuffled.length:Math.min(quizCount,shuffled.length);
  return shuffle(shuffled.slice(0,limit)).map(w=>{
    let avail=[...selectedTypes];
    if(avail.includes('C')&&w.s.length===0&&w.a.length===0)avail=avail.filter(t=>t!=='C');
    if(!avail.length)avail=['B'];
    return{word:w,type:avail[Math.floor(Math.random()*avail.length)]};
  });
}

function startQuiz(){
  quizQueue=buildQueue();
  if(!quizQueue.length)return;
  qIdx=0;score=0;correctCnt=0;wrongCnt=0;wrongWords=[];
  showScreen('quiz');renderQuestion();
}

function renderQuestion(){
  if(qIdx>=quizQueue.length){showResult();return;}
  answered=false;
  currentQ=quizQueue[qIdx];
  const{word:w,type}=currentQ;
  const pool=WORDS.filter(x=>selectedLessons.includes(x.l));

  // Build question
  let qDisplay,hint,correctAns,ttsWord;
  if(type==='A'){
    qDisplay=w.m; hint=''; correctAns=w.w; ttsWord=null;
  } else if(type==='B'){
    qDisplay=w.w; hint=''; correctAns=w.m; ttsWord=w.w;
  } else {
    // TYPE C: show original word, ask "유의어는?" or "반의어는?"
    // correct answer = one of syn/ant words; distractors = syn/ant from other words
    const hasSyn=w.s.length>0, hasAnt=w.a.length>0;
    // randomly pick syn or ant question
    let useKind;
    if(hasSyn&&hasAnt) useKind=Math.random()<0.5?'syn':'ant';
    else if(hasSyn) useKind='syn';
    else useKind='ant';
    const pool2=useKind==='syn'?w.s:w.a;
    correctAns=pool2[Math.floor(Math.random()*pool2.length)];
    qDisplay=w.w;
    hint=useKind==='syn'?'이 단어의 유의어는?':'이 단어의 반의어는?';
    ttsWord=w.w;
    currentQ.cKind=useKind;
    currentQ.correctAns=correctAns;
    currentQ.ttsWord=ttsWord;

    // Wrong choices: other words' syn/ant pool (avoid overlap with correct)
    const allSynAnt=[];
    pool.forEach(x=>{
      if(x.w===w.w)return;
      x.s.forEach(s=>{if(s!==correctAns)allSynAnt.push(s);});
      x.a.forEach(a=>{if(a!==correctAns)allSynAnt.push(a);});
    });
    const wrongOpts=shuffle([...new Set(allSynAnt)]).slice(0,3);
    const choices=shuffle([correctAns,...wrongOpts]);

    // Progress
    document.getElementById('q-progress').style.width=(qIdx/quizQueue.length*100)+'%';
    document.getElementById('q-counter').textContent=`${qIdx+1}/${quizQueue.length}`;
    document.getElementById('q-score-disp').textContent=`${score}점`;
    document.getElementById('q-lesson-info').textContent=`Lesson ${w.l}`;
    const badges={A:'badge-A TYPE A · 뜻→단어',B:'badge-B TYPE B · 단어→뜻',C:'badge-C TYPE C · 유의어/반의어 찾기'};
    const [bc2]=badges[type].split(' ');
    document.getElementById('q-type-badge').innerHTML=`<span class="q-type-badge ${bc2}">${badges[type].slice(bc2.length+1)}</span>`;
    const we2=document.getElementById('q-word');
    we2.textContent=qDisplay;
    document.getElementById('q-hint').textContent=hint;
    document.getElementById('tts-btn').style.display='block';
    const ce2=document.getElementById('choices');
    ce2.innerHTML='';
    choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.textContent=c;
      btn.onclick=()=>selectAnswer(btn,c,correctAns,w);
      ce2.appendChild(btn);
    });
    document.getElementById('feedback-area').innerHTML='';
    document.getElementById('next-btn').style.display='none';
    return; // early return — rest handled above
  }
  currentQ.correctAns=correctAns;
  currentQ.ttsWord=ttsWord;
  currentQ.cType=type;

  // Wrong choices (A/B only — C handled above)
  const others=shuffle(pool.filter(x=>x.w!==w.w));
  let wrongOpts;
  if(type==='A') wrongOpts=others.slice(0,3).map(x=>x.w);
  else wrongOpts=others.slice(0,3).map(x=>x.m);
  const choices=shuffle([correctAns,...wrongOpts]);

  // Progress
  document.getElementById('q-progress').style.width=(qIdx/quizQueue.length*100)+'%';
  document.getElementById('q-counter').textContent=`${qIdx+1}/${quizQueue.length}`;
  document.getElementById('q-score-disp').textContent=`${score}점`;
  document.getElementById('q-lesson-info').textContent=`Lesson ${w.l}`;

  // Badge
  const badges={A:'badge-A TYPE A · 뜻→단어',B:'badge-B TYPE B · 단어→뜻'};
  const [bc]=badges[type].split(' ');
  document.getElementById('q-type-badge').innerHTML=`<span class="q-type-badge ${bc}">${badges[type].slice(bc.length+1)}</span>`;

  // Word
  document.getElementById('q-word').textContent=qDisplay;
  document.getElementById('q-hint').textContent='';
  document.getElementById('tts-btn').style.display=ttsWord?'block':'none';

  // Choices
  const ce=document.getElementById('choices');
  ce.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c;
    btn.onclick=()=>selectAnswer(btn,c,correctAns,w);
    ce.appendChild(btn);
  });
  document.getElementById('feedback-area').innerHTML='';
  document.getElementById('next-btn').style.display='none';
}

function speakWord(){
  if(currentQ?.ttsWord) speakEnglish(currentQ.ttsWord);
}

function selectAnswer(btn,chosen,correct,w){
  if(answered)return; answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.add('disabled');b.onclick=null;
    if(b.textContent===correct)b.classList.add('reveal');
  });
  const ok=chosen===correct;
  if(ok){btn.classList.add('correct');btn.classList.remove('reveal');score+=10;correctCnt++;}
  else{btn.classList.add('wrong');wrongCnt++;wrongWords.push(w);}
  showFeedback(ok,w);
  document.getElementById('next-btn').style.display='block';
  document.getElementById('q-score-disp').textContent=`${score}점`;
}

function showFeedback(ok,w){
  const syn=w.s.length?w.s.join(', '):'-';
  const ant=w.a.length?w.a.join(', '):'-';
  document.getElementById('feedback-area').innerHTML=`
  <div class="feedback-box ${ok?'correct':'wrong'}">
    <div class="fb-status ${ok?'ok':'no'}">${ok?'✅ 정답입니다!':'❌ 오답입니다'}</div>
    <div class="fb-row"><span class="fb-label kr">한글뜻</span><span class="fb-val">${w.m}</span></div>
    <div class="fb-row"><span class="fb-label en">영단어</span><span class="fb-val">${w.w}</span></div>
    <div class="fb-row"><span class="fb-label syn">동의어</span><span class="fb-val">${syn}</span></div>
    <div class="fb-row"><span class="fb-label ant">반의어</span><span class="fb-val">${ant}</span></div>
  </div>`;
}

function nextQuestion(){qIdx++;renderQuestion();}

function showResult(){
  showScreen('result');
  const total=quizQueue.length;
  const pct=Math.round(correctCnt/total*100);
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-total').textContent=`/ ${total*10}점 만점`;
  document.getElementById('r-correct').textContent=correctCnt;
  document.getElementById('r-wrong').textContent=wrongCnt;
  document.getElementById('r-pct').textContent=pct+'%';
  const comments=[[90,'🏆 완벽해요! 최고입니다!'],[70,'👍 잘했어요! 조금만 더!'],[50,'📚 절반 이상! 계속 도전하세요!'],[0,'💪 다시 도전해 보세요!']];
  document.getElementById('r-comment').textContent=comments.find(([t])=>pct>=t)[1];
  const wl=document.getElementById('wrong-list');
  wl.innerHTML=wrongWords.length?`<div class="section-title">❌ 틀린 단어 목록</div>`+wrongWords.map(w=>`<div class="wrong-item"><div class="wi-word">${w.w}</div><div class="wi-mean">${w.m}</div></div>`).join(''):'';
}

function retryQuiz(){startQuiz();}
function goHome(){showScreen('home');}
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+n).classList.add('active');}

init();
</script>

</html>
